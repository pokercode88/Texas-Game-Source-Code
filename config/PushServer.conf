	<Main>
	<Interface>
		#游戏配置服务
		<ConfigServer>
			ProxyObj = XGame.ConfigServer.ConfigServantObj
		</ConfigServer>
		#数据库代理服务
		<DBAgentServer>
			ProxyObj = XGame.DBAgentServer.DBAgentServantObj
		</DBAgentServer>
		#游戏广场代理服务
		<HallServer>
			ProxyObj = XGame.HallServer.HallServantObj
		</HallServer>
		#游戏网关出口代理
		<RouterPushObj>
			ProxyObj = XPassport.RouterServer.PushObj
		</RouterPushObj>
		#游戏登录代理服务
		<LoginServer>
			ProxyObj = XGame.LoginServer.LoginServantObj
		</LoginServer>
	</Interface>
	#在线人数
	OnlineNumber = 50|100
	#更新在线人数时间间隔
	UpdateOnlineInterval = 60
</Main>

